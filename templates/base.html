<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/png" href="C:\Users\shrey\OneDrive\Desktop\codetoparse-main\Images\PSLogo.png">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Offside&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Language Dropdown (Consistent across all pages) -->
    <div class="language-dropdown">
        <label for="language-select">Language:</label>
        <select id="language-select">
            <option value="English" selected>English</option>
            <option value="Hindi">Hindi</option>
            <option value="Assamese">Assamese</option>
            <option value="Bengali">Bengali</option>
            <option value="Gujarati">Gujarati</option>
            <option value="Kannada">Kannada</option>
            <option value="Malayalam">Malayalam</option>
            <option value="Marathi">Marathi</option>
            <option value="Odia">Odia</option>
            <option value="Punjabi">Punjabi</option>
            <option value="Tamil">Tamil</option>
            <option value="Telugu">Telugu</option>
            <option value="Urdu">Urdu</option>
            <option value="Sindhi">Sindhi</option>
            <option value="Dogri">Dogri</option>
            <option value="Konkani">Konkani</option>
            <option value="Bodo">Bodo</option>
            <option value="Kashmiri">Kashmiri</option>
            <option value="Maithili">Maithili</option>
            <option value="Manipuri">Manipuri</option>
            <option value="Nepali">Nepali</option>
            <option value="Sanskrit">Sanskrit</option>
            <option value="Santhali">Santhali</option>
        </select>
    </div>

    <!-- Main Heading -->
    <header class="main-header">
        <h1>PRESCRIPTLY</h1>
    </header>

    <!-- Main Content Container -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Shared Script -->
    <script>
        // Language selection logic (same across all pages)
        document.addEventListener("DOMContentLoaded", function() {
            const selectedLang = localStorage.getItem("selectedLanguage") || "English";
            document.getElementById("language-select").value = selectedLang;
        });

        document.getElementById("language-select").addEventListener("change", function() {
            const lang = this.value;
            localStorage.setItem("selectedLanguage", lang);
            fetch('/set_language', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'language=' + encodeURIComponent(lang)
            }).then(() => location.reload());
        });
    </script>
</body>
</html>
